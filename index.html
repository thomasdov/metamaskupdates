<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MetaMask · Static Mockup (ears at bottom)</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
 <!-- Add this to your <head> -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://fast.fonts.net/cssapi/your-project-id.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff2eb;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem 0 1.5rem; /* bottom padding managed by fox */
    }

    /* main container – centered and takes content width */
    .mockup-container {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
	  z-index:2;
    }

    /* Language selector */
    .lang-row {
	  
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
	  margin-right: -20rem;
    }
    .lang-button {
	  width:11rem;
      align-items: center;
      gap: 2px;
      background: #000000;
      border: 1px solid #E2E8F0;
      border-radius: 15px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      cursor: default;
    }
    .lang-button i {
      font-size: 0.75rem;
      color: #FFFFFF;
	  flow: right;
	  text-align:right;
	  margin-left: 4rem;
    }
	 

    /* Main card */
    .metamask-card {
      background: transparent;
      border-radius: 32px;
      padding: 2rem 1.75rem 1.75rem 1.75rem;
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 6.75rem;
	  margin-top: 6.75rem;
    }
    .logo-area img {
		width: 200px;
		height: 200px;
	}
    
    .brand-stack {
      line-height: 0.75;
	  font-family: 'Balgin ', sans-serif;
      background-clip: text;
      -webkit-background-clip: text;
      font-size: 4.6rem;
	  
      font-weight: 700;
	  letter-spacing: 1px;
    }
    .brand-stack .meta-text {
	   
      background-clip: text;
      -webkit-background-clip: text;
       
      font-weight: 700;
       
      color: #3e0560;
      display: block;
    }
     
	
	.brand-stack .mask-text {
	  font-family: 'Balgin W05 Bold', sans-serif;
      background-clip: text;
      -webkit-background-clip: text;
       
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #3e0560;
      display: block;
	  margin-left: 0.75rem;
    }

    /* Buttons */
    .oauth-group {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 24rem;
      background: #000000;
      border: 1px solid #E2E8F0;
      border-radius: 15px;
      padding: 0.85rem 0;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      cursor: default;
    }
	
    .fa-brands {
            background: conic-gradient(
			from -45deg, #ea4335 110deg, #4285f4 90deg 180deg, 
			#34a853 180deg 270deg, #fbbc05 270deg) 
			73% 55%/150% 150% no-repeat;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }
	.oauth-btn:hover {
      background: #FBFCFE;
      border-color: #CBD5E1;
      transform: scale(0.99);
    }	
    .oauth-btn i {
      font-size: 1.2rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 1.5rem 0 1.5rem 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #686e7d;
    }
    .divider-text {
      font-size: 1.1rem;
      font-weight: 500;
      color: #686e7d;
       
      letter-spacing: 0.5px;
    }

    /* Import link */
    .import-link {
      text-align: center;
      margin: 1rem 0 1.75rem 0;
    }
    .import-link .mock-link {
      display: inline-flex;
      align-items: center;
	  width:24rem;
      gap: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #000000;
      text-decoration: none;
      background: #FFFFFF;
      padding: 0.7rem 1.6rem;
      border-radius: 15px;
      border: 1px solid #FFFFFF;
      cursor: default;
	  cursor: pointer;
      transition: all 0.2s;
    }
	
	/* Import link – now a real link to import.html */
    .import-link {
      text-align: center;
      margin: 1rem 0 1.75rem 0;
    }
    /* Import link – now a real link to import.html */
    .import-link {
      text-align: center;
      margin: 1rem 0 1.75rem 0;
    }
	.Import-link :hover{
	  background: #CCCCCC;
	}
    .import-link a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
	  color: #000000;
      cursor: pointer;
      transition: all 0.2s;
    }
    .import-link a:hover {
      
      border-color: transparent;
      
    }
    .import-link a:hover i {
      transform: translateX(2px);
    }
    .import-link a i {
      transition: transform 0.2s;
    }

    /* Terms */
    .terms {
      text-align: center;
      padding-top: 0.75rem;
      border-top: 1px solid #F0F4F9;
    }
    .terms p {
      font-size: 1rem;
      color: #000000;
      line-height: 1.45;
      font-weight: 400;
    }
    .terms .mock-link-light {
      color: #4459ff;
      font-weight: 500;
      text-decoration: none;
      cursor: default;
    }
	
	 
    /* FOX – fixed at the bottom of the page, ears only, outside any card */
    .bottom-fox {
      width: 90%;
      display: flex;
      justify-content: center;
      margin-top: -78%;     /* pushes it to bottom of flex column */
      padding-bottom: 1rem; /* little breathing room */
	  pointer-events: none;   /* ← add this */
      z-index: 1;
	  
    }

    .ears-only {
      width: 300%;            /* 80% of container width */
      max-width: 580%;
      overflow: hidden;      /* clip everything except the ears */
      height: 10%;          /* enough to show the ears */
      display: flex;
      justify-content: center;
    }

    .ears-only svg {
      width: 100%;
      height: 80%;
      transform: translateY( 74%);  /* push the fox down so only ears are visible */
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1));
    }

    /* Responsive */
    @media (max-width: 480px) {
      .metamask-card {
        padding: 1.5rem 1.25rem;
      }
      .brand-stack .meta-text,
      .brand-stack .mask-text {
        font-size: 2rem;
      }
      .ears-only {
        height: 45px;
      }
    }
	.bold-text {
    font-family: 'Balgin', sans-serif;
    font-weight: bold;          /* this triggers the bold @font-face */
    }
	@font-face {
    font-family: 'Balgin';
    src: url('balgin-bold.woff2') format('woff2'),
         url('balgin-bold.woff') format('woff');
    font-weight: bold;           /* or 700 */
    font-style: normal;
    font-display: swap;
    }
	
  </style>
</head>
<body>
<div class="main-container">
 <!-- Language selector -->
    <div class="lang-row">
      <div class="lang-button">
          English <span> </span><i class="fas fa-chevron-down"></i>
      </div>
    </div>
  <div class="mockup-container">
    

    <!-- Main card (no fox inside) -->
    <div class="metamask-card">
      <div class="logo-area">
         <img src="css/metamasklogo.png" alt="Description of the image" width="500" height="300">
        
      </div>

      <div class="oauth-group">
        <div class="oauth-btn">
          <i class="fa-brands fa-google"></i> Sign in with Google
        </div>
        <div class="oauth-btn">
          <i class="fab fa-apple" style="color: #FFFFFF;"></i> Sign in with Apple
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or</div>
        <div class="divider-line"></div>
      </div>

      <div class="import-link">
        <div class="mock-link">
		<a href="import.html">
            Import using Secret Recovery Phrase
		</a>	
           
        </div>
      </div>

      <div class="terms">
        <p>
          By continuing, I agree to MetaMask's 
          <span class="mock-link-light"> <a href="https://consensys.io/terms-of-use">Terms of Use</a></span> and 
          <span class="mock-link-light"> <a href="https://consensys.io/privacy-notice">Privacy notice</a></span>.
        </p>
      </div>
    </div>
  </div>
</div>
